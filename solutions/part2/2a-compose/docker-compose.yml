services:
  mock-api:
    image: mock-openai-api:exam
    ports:
      - "8080:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "80:8080"
    environment:
      - OPENAI_API_BASE_URL=http://mock-api:8000/v1
    volumes:
      - openwebui-data:/app/backend/data
    depends_on:
      mock-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  openwebui-data:
